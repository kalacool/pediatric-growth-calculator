<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童生長曲線與骨齡預測計算器</title>

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .header-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            margin: 0 auto 20px auto;
            display: block;
        }

        h1 {
            text-align: center;
            font-size: 1.75rem;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 25px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            color: #374151;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 600px) {
            .grid-layout { grid-template-columns: 1fr 1fr; }
            .col-span-2 { grid-column: span 2; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #4b5563;
        }

        input[type="number"],
        input[type="date"],
        select {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
            height: 100%;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }

        .radio-group input {
            margin-right: 5px;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }

        .btn-reset {
            background-color: #9ca3af;
            color: white;
        }

        .btn-reset:hover { background-color: #6b7280; }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            display: none;
        }

        .disclaimer {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        /* 針對原廠 JS 產出的結果進行美化 */
        .official-result {
            margin-top: 20px; 
            padding: 15px; 
            background: #fff; 
            border-radius: 8px; 
            border: 1px solid #e5e7eb;
        }
        .official-result span {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="./img/IMG_5386.svg" alt="兒童生長計算器圖示" class="header-image">
    <h1>兒童生長曲線與骨齡預測計算器</h1>

    <form id="growth-form">
        <div class="section-title">基本資料</div>
        <div class="grid-layout">
            <div class="form-group">
                <label>性別</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male" checked> 男</label>
                    <label><input type="radio" name="gender" value="female"> 女</label>
                </div>
            </div>
            <div class="form-group">
                <label for="birthday">小孩生日</label>
                <input type="date" id="birthday" required>
            </div>
            <div class="form-group">
                <label for="height">身高 (公分)</label>
                <input type="number" id="height" step="0.1" placeholder="例如：120.5" required>
            </div>
            <div class="form-group">
                <label for="weight">體重 (公斤)</label>
                <input type="number" id="weight" step="0.1" placeholder="例如：22.0" required>
            </div>
        </div>

        <div class="section-title">出生資訊 (選填，計算早產/胎齡使用)</div>
        <div class="grid-layout">
            <div class="form-group">
                <label for="birth-weight">出生體重 (公克)</label>
                <input type="number" id="birth-weight" placeholder="例如：3200">
            </div>
            <div class="form-group">
                <label for="gestational-age">懷孕週數</label>
                <input type="number" id="gestational-age" placeholder="例如：39">
            </div>
            <div class="form-group col-span-2">
                <label>胎數</label>
                <div class="radio-group">
                    <label><input type="radio" name="twins" value="single" checked> 單胞胎</label>
                    <label><input type="radio" name="twins" value="twin"> 雙胞胎</label>
                </div>
            </div>
        </div>

        <div class="section-title">父母身高 (選填，計算遺傳目標身高)</div>
        <div class="grid-layout">
            <div class="form-group">
                <label for="father-height">父高 (公分)</label>
                <input type="number" id="father-height" step="0.1">
            </div>
            <div class="form-group">
                <label for="mother-height">母高 (公分)</label>
                <input type="number" id="mother-height" step="0.1">
            </div>
        </div>

        <div class="section-title">用骨齡預測身高 (選填進階功能)</div>
        <div class="grid-layout">
            <div class="form-group">
                <label>骨齡檢查結果 (歲 / 月)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="bone-age-years" placeholder="歲" min="0" max="18">
                    <input type="number" id="bone-age-months" placeholder="月" min="0" max="11">
                </div>
            </div>
            <div class="form-group">
                <label for="exam-height">檢查骨齡當日的身高 (公分)</label>
                <input type="number" id="exam-height" step="0.1">
            </div>
        </div>

        <div class="btn-container">
            <button type="submit" class="btn-submit">計算結果</button>
            <button type="reset" class="btn-reset" onclick="hideResult()">清空表單</button>
        </div>
    </form>

    <div id="result-box"></div>

    <div class="disclaimer">
        <strong>資料來源說明：</strong><br>
        1. 本工具0-5歲之資料來源為國民健康署公布之「兒童生長曲線」，5歲以上資料來源為依據陳偉德醫師及張美惠醫師2010年發表之研究成果制定。<br>
        2. 計算結果僅供參考，如有生長發育之疑義，請逕洽醫師。
    </div>
</div>

<div id="legacy-hidden-forms" style="display: none;">
    <input type="text" id="inp_year_m"><input type="text" id="inp_month_m"><input type="text" id="inp_day_m">
    <input type="text" id="inp_height_m"><input type="text" id="inp_weight_m">

    <input type="text" id="inp_bbw_f"><input type="text" id="inp_ga_f">
    <input type="radio" id="radio_singleton_f" name="pregnancy_type_f" value="singleton">
    <input type="radio" id="radio_twins_f" name="pregnancy_type_f" value="twins">
    <input type="text" id="inp_height_father_f"><input type="text" id="inp_height_mother_f">

    <input type="text" id="inp_height_ph_f">

</div>

<script>
    function age_getAge_inString(dateString, examDay){
        if(examDay == 'today'){
            var today = new Date();
        }else{
            var today = new Date(examDay);
        }	
        var birthDate = new Date(dateString);
        var y = birthDate.getFullYear() - today.getFullYear();
        y *= -1;
        var m = birthDate.getMonth() - today.getMonth();
        var d = birthDate.getDate() - today.getDate();	
        var m_inBirthday = age_how_many_days_in_this_month(birthDate.getFullYear(), birthDate.getMonth());	
        var strMandarin=strEnglish="";
        var try_today = new Date(1908, today.getMonth(), today.getDate());
        var try_birthdate = new Date(1908, birthDate.getMonth(), birthDate.getDate());
        var try_day = try_birthdate.getTime() - try_today.getTime();
        if(try_day < 0){
            if(d < 0){
                m = today.getMonth() - birthDate.getMonth();
                d = today.getDate() - birthDate.getDate();			
            }else{
                m = today.getMonth() - birthDate.getMonth() - 1;
                d = m_inBirthday - birthDate.getDate() + today.getDate();
            }
        }else if(try_day == 0){
            m = 0;
            d = 0;			
        }else{
            y -= 1;
            if(d < 0){
                m = 12 - (birthDate.getMonth() + 1) + (today.getMonth() + 1);
                d = today.getDate() - birthDate.getDate();			
            }else{
                m = 12 - (birthDate.getMonth() + 1) + (today.getMonth() + 1) - 1;
                d = m_inBirthday - birthDate.getDate() + today.getDate();
            }
        }
        strMandarin=y+"歲"+m+"月"+d+"天";		
        strEnglish=y+"Y"+m+"MO";
        var str=[strMandarin,strEnglish];
        return str;
    }
    
    function age_getAge_inDecimal(dateString, examDay){
        const msInYear = 31556926000;
        if(examDay == 'today'){
            var today = new Date();
        }else{
            var today = new Date(examDay);
        }
        var birthDate = new Date(dateString);
        var age_ms = today.getTime() - birthDate.getTime();
        var age_y = age_ms / msInYear; 
        var age_round = Math.round(age_y * 100) / 100;
        return age_round;
    }
    
    function age_how_many_days_in_this_month(what_year, what_month){
        var m = -999;
        var y = what_year % 4;
        switch(what_month){
            case 0:		m = 31;		break;
            case 1:
                m = ((y == 0)?29:28);	break;
            case 2:     m = 31;		break;
            case 3:		m = 30;		break;
            case 4:		m = 31;		break;
            case 5:		m = 30;		break;
            case 6:		m = 31;		break;
            case 7:		m = 31;		break;
            case 8:		m = 30;		break;
            case 9:		m = 31;		break;
            case 10:	m = 30;		break;
            case 11:	m = 31;		break;
            default:	m = 30;		break;
        }
        return m; 
    }
    
    function age_get_percentile_array_year_month_old_to_decimal(arr_yearOld, arr_monthOld){
        var iStop = arr_yearOld.length;
        var i = 0;
        var age;
        var arr_age = new Array();
        for(i=0;i<iStop;i++){
            age = arr_yearOld[i] + (arr_monthOld[i] / 12);			
            arr_age.push(age);
        }
        return arr_age;
    }
    
    function gd_determine_age_interval(age){
        var arr_age = new Array;
        arr_age = cur_get_percentile_arr_age();
        var iStop = arr_age.length - 1;
        var falseToStop = true;
        var i = 0;		
        while(falseToStop){
            if((age >= arr_age[iStop])){
                falseToStop = false;	i = iStop;				
            }else if((arr_age[i] <= age) && (arr_age[i+1] > age)){
                falseToStop = false;			
            }else{
                i++;
            }
        }
        return i;
    }
    
    function gd_calculate_above_or_below_determineValueOnLine(arr_value, ageInterval, age){
        var arr_age = new Array();	arr_age = cur_get_percentile_arr_age();
        var i = ageInterval;
        var iStop = (arr_age.length - 1);
        var valueOnLine = 0.01;		
        if(i >= iStop){
            valueOnLine = arr_value[iStop];
        }else{
            valueOnLine = (((age - arr_age[i]) * (arr_value[i+1] - arr_value[i]))/(arr_age[i+1] - arr_age[i])) + arr_value[i];
        }
        return valueOnLine
    }
    
    function Nz(fieldToCheck, valueIfEmpty){
        if (fieldToCheck !== undefined && fieldToCheck !== "" && fieldToCheck !== null) {
            return fieldToCheck;
        } else {
            return valueIfEmpty;
        }
    }
    
    function gd_isIntegerKey(evt){
        var charCode = (evt.which) ? evt.which : event.keyCode
        if((charCode > 31 && charCode < 48) || charCode > 57)
            return false;
        return true;
    }
    
    function gd_isNumberKey(evt){
        var charCode = (evt.which) ? evt.which : event.keyCode
        if((charCode > 31 && charCode < 48 && charCode != 46) || charCode > 57)
            return false;
        return true;
    }
    
    function gd_debug_resize(){
        var w = parseInt(window.outerWidth);
        var h = parseInt(window.outerHeight);
        var x = "User-agent header sent: " + navigator.userAgent;    	
        var txt = "Window size: width=" + w + ", height=" + h + "<br>" + x;	
        document.getElementById("body_resize").innerHTML = txt;	
    }
    
    function gd_determine_exact_height(intAge ,dblHeight ,strGender ,nowOrFuture){
        var i = gd_determine_age_interval(intAge);	
        var dblFutureHeight = 0.01;
        var strRtn = '';	
        var strHeightPercentile = '';
        if(nowOrFuture == 'future'){	
            strHeightPercentile = cp_calculate_above_or_below_line_determinePercentile(dblHeight, strGender, i, intAge, "height");
        }else{
            var arrAge = new Array();
            arrAge = cur_get_percentile_arr_age();
            var aStop = arrAge.length - 1; 	
            var AgeMax = arrAge[aStop];
            strHeightPercentile = cp_calculate_above_or_below_line_determinePercentile(dblHeight, strGender, aStop, AgeMax, "height");	
        }
        switch(strHeightPercentile[0]){
            case "<3%":				
            case "3-15%":
                dblFutureHeight = gd_determine_exact_percentile_in_interval("=3%", "=15%", strGender, intAge, dblHeight ,nowOrFuture);
                break;			
            case "15-50%":
                dblFutureHeight = gd_determine_exact_percentile_in_interval("=15%", "=50%", strGender, intAge, dblHeight ,nowOrFuture);
                break;
            case "50-85%":
                dblFutureHeight = gd_determine_exact_percentile_in_interval("=50%", "=85%", strGender, intAge, dblHeight ,nowOrFuture);
                break;
            case "85-97%":					
            case ">97%":
                dblFutureHeight = gd_determine_exact_percentile_in_interval("=85%", "=97%", strGender, intAge, dblHeight ,nowOrFuture);
                break;
            case "=3%":
            case "=15%":
            case "=50%":
            case "=85%":
            case "=97%":
                if(nowOrFuture == 'future'){
                    dblFutureHeight = gd_determine_end_height_on_line(strHeightPercentile[0], strGender);
                }else{
                    dblFutureHeight = gd_determine_exact_height_on_line(strHeightPercentile[0], strGender, intAge);
                }	
                break;					
        }
        str_nowOrFuture_rtn = (nowOrFuture == 'future')?"<b>骨齡(百分位:" + strHeightPercentile[0] + ")</b>預測未來身高":"<b>遺傳身高</b>預測現在身高";		
        return strRtn = str_nowOrFuture_rtn + "約在:" + dblFutureHeight + "cm附近";
    } 

    function gd_determine_exact_percentile_in_interval(strPercentile_min, strPercentile_max, strGender, age, dblHeight ,nowOrFuture){
        var bMaxNow = gd_determine_exact_height_on_line(strPercentile_max, strGender, age);
        var bMinNow = gd_determine_exact_height_on_line(strPercentile_min, strGender, age);
        var bMaxFuture = gd_determine_end_height_on_line(strPercentile_max, strGender);
        var bMinFuture = gd_determine_end_height_on_line(strPercentile_min, strGender);
        var parameter = 0.01;
        var dblRtn = 0.01;
        if(nowOrFuture == 'future'){
            parameter = (dblHeight - bMinNow)/(bMaxNow - bMinNow);
            dblRtn = ((bMaxFuture - bMinFuture) * parameter) + bMinFuture;
        }else{
            parameter = (dblHeight - bMinFuture)/(bMaxFuture - bMinFuture);
            dblRtn = ((bMaxNow - bMinNow) * parameter) + bMinNow;
        }
        dblRtn = Math.round(dblRtn * 100) / 100;   
        return dblRtn;
    }

    function gd_determine_exact_height_on_line(str_percentile, str_gender, age){
        var arr_value = new Array();
        arr_value = gd_get_height_array(str_percentile, str_gender);	
        var valueOnLine = 0.01;
        var ageInterval = gd_determine_age_interval(age);		
        valueOnLine = gd_calculate_above_or_below_determineValueOnLine(arr_value, ageInterval, age);
        return valueOnLine;
    }

    function gd_determine_end_height_on_line(str_percentile, str_gender){
        var arr_value = new Array();
        arr_value = gd_get_height_array(str_percentile, str_gender);	
        var iStop = arr_value.length - 1;
        var dblRtn = arr_value[iStop];
        return dblRtn;		
    }

    function gd_get_height_array(str_percentile, str_gender){
        var strGen='';
        if(str_gender=='_m' || str_gender=='_m'){
            strGen=str_gender;
        }else{
            strGen=(str_gender=='male'?'_m':'_f');
        }
        var arr = new Array();		arr = cur_get_percentile_arr_gender(strGen);	
        var arr_value = new Array();
        var i = 0;
        switch(str_percentile){
            case "=3%":
                i = 0;	break;
            case "=15%":
                i = 1;	break;
            case "=50%":
                i = 2;	break;
            case "=85%":
                i = 3;	break;
            case "=97":
                i = 4;	break;
        }
        arr_value = arr[i][0];
        return arr_value;		
    }

    function gd_numOk(obj){
        var rtn=(isNaN(parseInt(obj))?false:true);
        if(rtn){
            rtn=(parseInt(obj)==0?false:true);
            if(rtn){
                rtn=(parseInt(obj)<0?false:true);
            }
        }
        return rtn;
    }

    function fool_hide_advance(gender){
        var strGender = ((gender == 'male')?'_m':'_f');	
        var id = 'form_predict' + strGender;	
        var o = document.getElementById(id);
        if( o.style.display=='inline'){
            o.style.display='none';
        }else{
            o.style.display='inline';    
        }
    }

    function fool_input_array(){
        var d = new Date();		var thisYear = d.getFullYear() - 1911;  	
        var arr = new Array();
        var input = new Array();	var minVal = new Array();	var maxVal = new Array();	var strErr = new Array();	
        input.push("inp_year");				minVal.push(0);		maxVal.push(thisYear);	strErr.push("inp_year_error");
        input.push("inp_month");			minVal.push(1);		maxVal.push(12);		strErr.push("inp_month_error");
        input.push("inp_day");				minVal.push(1);		maxVal.push(31);		strErr.push("inp_day_error");
        input.push("inp_height");			minVal.push(25);	maxVal.push(255);		strErr.push("inp_height_error");
        input.push("inp_weight");			minVal.push(0.1);	maxVal.push(255);		strErr.push("inp_weight_error");
        input.push("inp_bbw");			    minVal.push(400);	maxVal.push(6000);		strErr.push("inp_bbw_error");
        input.push("inp_height_father");	minVal.push(25);	maxVal.push(255);		strErr.push("inp_height_father_error");
        input.push("inp_height_mother");	minVal.push(25);	maxVal.push(255);		strErr.push("inp_height_mother_error");
        arr.push(input);					arr.push(minVal);	arr.push(maxVal);		arr.push(strErr);
        return arr;
    }

    function fool_input_array_ph(){	
        var arr = new Array();
        var input = new Array();	var minVal = new Array();	var maxVal = new Array();	var strErr = new Array();	
        input.push("inp_boneAge_year_ph");	minVal.push(0);		maxVal.push(105);	strErr.push("inp_year_ph_error");
        input.push("inp_boneAge_month_ph");	minVal.push(0);		maxVal.push(11);	strErr.push("inp_month_ph_error");
        input.push("inp_height_ph");		minVal.push(25);	maxVal.push(255);	strErr.push("inp_height_ph_error");
        arr.push(input);					arr.push(minVal);	arr.push(maxVal);	arr.push(strErr);
        return arr;
    }

    function fool_input_array_bbw(){

        const suffix = gender === 'male' ? '_m' : '_f';
        
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const fatherHeight = parseFloat(document.getElementById('father-height').value) || 0;
        const motherHeight = parseFloat(document.getElementById('mother-height').value) || 0;
        
        // 處理日期：西元轉民國
        const birthdayVal = document.getElementById('birthday').value;
        const dateObj = new Date(birthdayVal);
        const rocYear = dateObj.getFullYear() - 1911;
        const month = dateObj.getMonth() + 1;
        const day = dateObj.getDate();

        // 2. 將值橋接到隱藏的原廠輸入框
        document.getElementById('inp_year' + suffix).value = rocYear;
        document.getElementById('inp_month' + suffix).value = month;
        document.getElementById('inp_day' + suffix).value = day;
        document.getElementById('inp_height' + suffix).value = height;
        document.getElementById('inp_weight' + suffix).value = weight;
        
        document.getElementById('inp_bbw' + suffix).value = document.getElementById('birth-weight').value || '';
        document.getElementById('inp_ga' + suffix).value = document.getElementById('gestational-age').value || '';
        
        const isTwin = document.querySelector('input[name="twins"]:checked').value === 'twin';
        document.getElementById('radio_twins' + suffix).checked = isTwin;
        document.getElementById('radio_singleton' + suffix).checked = !isTwin;

        document.getElementById('inp_height_father' + suffix).value = fatherHeight > 0 ? fatherHeight : '';
        document.getElementById('inp_height_mother' + suffix).value = motherHeight > 0 ? motherHeight : '';

        // 骨齡橋接
        document.getElementById('inp_boneAge_year_ph' + suffix).value = document.getElementById('bone-age-years').value || '';
        document.getElementById('inp_boneAge_month_ph' + suffix).value = document.getElementById('bone-age-months').value || '';
        document.getElementById('inp_height_ph' + suffix).value = document.getElementById('exam-height').value || '';

        // 清空之前的舊結果
        document.getElementById('result' + suffix).innerHTML = '';
        document.getElementById('result_ph' + suffix).innerHTML = '';

        // 3. 呼叫原廠 JS 進行計算
        try {
            cp_calculate_above_or_below_line(gender);
            
            // 如果有填寫骨齡或骨齡身高，則觸發骨齡計算
            if(document.getElementById('bone-age-years').value !== '' || document.getElementById('exam-height').value !== '') {
                bone_calculate_predict_height(gender);
            }
        } catch (error) {
            console.error("執行計算時發生錯誤:", error);
        }

        // 4. 構建自訂摘要 (BMI 與 遺傳身高)
        let customHTML = `<h3 style="margin-top:0; color:#1e40af;">📌 綜合評估摘要</h3>`;
        
        // BMI 計算
        const heightInMeters = height / 100;
        const bmi = weight / (heightInMeters * heightInMeters);
        customHTML += `<p><strong>目前 BMI：</strong> ${bmi.toFixed(1)}</p>`;

        // 遺傳目標身高預測 (Target Height) 公式
        if (fatherHeight > 0 && motherHeight > 0) {
            let targetHeight = 0;
            if (gender === 'male') {
                targetHeight = (fatherHeight + motherHeight + 13) / 2;
            } else {
                targetHeight = (fatherHeight + motherHeight - 13) / 2;
            }
            customHTML += `<p><strong>遺傳目標身高預測：</strong> 約 ${targetHeight.toFixed(1)} 公分 (±7.5公分)</p>`;
        }

        // 5. 抓取原廠結果並組合
        const officialResult = document.getElementById('result' + suffix).innerHTML;
        const officialBoneResult = document.getElementById('result_ph' + suffix).innerHTML;

        let finalHTML = customHTML;

        // 插入生長百分位結果
        if (officialResult && officialResult.trim() !== '') {
            finalHTML += `<div class="official-result">`;
            finalHTML += `<h4 style="margin-top:0; color:#047857; border-bottom:1px solid #d1fae5; padding-bottom:5px;">📈 生長百分位結果</h4>`;
            finalHTML += officialResult;
            finalHTML += `</div>`;
        }

        // 插入骨齡預測結果
        if (officialBoneResult && officialBoneResult.trim() !== '') {
            finalHTML += `<div class="official-result">`;
            finalHTML += `<h4 style="margin-top:0; color:#6d28d9; border-bottom:1px solid #ede9fe; padding-bottom:5px;">🦴 骨齡預測成年身高</h4>`;
            finalHTML += officialBoneResult;
            finalHTML += `</div>`;
        }

        // 顯示結果
        const resultBox = document.getElementById('result-box');
        resultBox.innerHTML = finalHTML;
        resultBox.style.display = 'block';
        
        // 平滑滾動到結果
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
</script>

</body>
</html>
